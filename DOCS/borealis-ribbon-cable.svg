<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr-down" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <path d="M0,0 L3,8 L6,0 Z" fill="#52a441"/>
    </marker>
  </defs>

  <!-- Light background -->
  <rect width="1100" height="760" fill="#ffffff"/>

  <!-- Title bar -->
  <rect width="1100" height="54" fill="#f1f3f5"/>
  <rect y="54" width="1100" height="3" fill="#52a441"/>
  <text x="24" y="35" font-size="16" font-weight="700" fill="#52a441">TrailCurrent Borealis</text>
  <text x="262" y="35" font-size="13" fill="#495057">20-Pin Ribbon Cable — Sensor Wiring Reference</text>
  <text x="1076" y="35" text-anchor="end" font-size="10" fill="#868e96">IDC 2x10 connector</text>

  <!-- Subtitle -->
  <text x="550" y="82" text-anchor="middle" font-size="12" fill="#495057">Flat ribbon cable layout — red stripe marks Pin 1 (3.3V end)</text>

  <!-- =============== RIBBON CABLE VISUALIZATION =============== -->
  <!-- Cable body background -->
  <rect x="40" y="100" width="1020" height="220" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="6"/>

  <!-- 20 individual wires, left to right.  x starts at 52, each wire = 50px pitch, 46px wide -->

  <!-- Pin 1: 3.3V — RED STRIPE (power) -->
  <rect x="52" y="108" width="46" height="204" fill="#e74c3c" stroke="#c0392b" stroke-width="1" rx="2"/>
  <text x="75" y="130" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">1</text>
  <text x="75" y="148" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">3.3V</text>
  <text x="75" y="165" text-anchor="middle" font-size="9" fill="#ffe5e3">Power</text>
  <text x="75" y="300" text-anchor="middle" font-size="8" fill="#ffd5d5">RED STRIPE</text>

  <!-- Pin 2: 5V (power) -->
  <rect x="102" y="108" width="46" height="204" fill="#52a441" stroke="#3d7d31" stroke-width="1" rx="2"/>
  <text x="125" y="130" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">2</text>
  <text x="125" y="148" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">5V</text>
  <text x="125" y="165" text-anchor="middle" font-size="9" fill="#dff2d8">Power</text>
  <text x="125" y="300" text-anchor="middle" font-size="8" fill="#dff2d8">MQ-6 only</text>

  <!-- Pin 3: GND -->
  <rect x="152" y="108" width="46" height="204" fill="#adb5bd" stroke="#868e96" stroke-width="1" rx="2"/>
  <text x="175" y="130" text-anchor="middle" font-size="12" fill="#212529" font-weight="700">3</text>
  <text x="175" y="148" text-anchor="middle" font-size="10" fill="#212529" font-weight="600">GND</text>
  <text x="175" y="165" text-anchor="middle" font-size="9" fill="#495057">Ground</text>

  <!-- Pin 4: GND -->
  <rect x="202" y="108" width="46" height="204" fill="#adb5bd" stroke="#868e96" stroke-width="1" rx="2"/>
  <text x="225" y="130" text-anchor="middle" font-size="12" fill="#212529" font-weight="700">4</text>
  <text x="225" y="148" text-anchor="middle" font-size="10" fill="#212529" font-weight="600">GND</text>
  <text x="225" y="165" text-anchor="middle" font-size="9" fill="#495057">Ground</text>

  <!-- Pin 5: IO43 (TXD) — unused -->
  <rect x="252" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="275" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">5</text>
  <text x="275" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO43</text>
  <text x="275" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">TXD</text>
  <text x="275" y="178" text-anchor="middle" font-size="8" fill="#adb5bd">unused</text>

  <!-- Pin 6: IO20 — USB D+ (reserved) -->
  <rect x="302" y="108" width="46" height="204" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" rx="2"/>
  <text x="325" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">6</text>
  <text x="325" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO20</text>
  <text x="325" y="165" text-anchor="middle" font-size="9" fill="#868e96">USB D+</text>
  <text x="325" y="178" text-anchor="middle" font-size="8" fill="#868e96">reserved</text>

  <!-- Pin 7: IO44 (RXD) — unused -->
  <rect x="352" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="375" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">7</text>
  <text x="375" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO44</text>
  <text x="375" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">RXD</text>
  <text x="375" y="178" text-anchor="middle" font-size="8" fill="#adb5bd">unused</text>

  <!-- Pin 8: IO19 — USB D- (reserved) -->
  <rect x="402" y="108" width="46" height="204" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" rx="2"/>
  <text x="425" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">8</text>
  <text x="425" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO19</text>
  <text x="425" y="165" text-anchor="middle" font-size="9" fill="#868e96">USB D-</text>
  <text x="425" y="178" text-anchor="middle" font-size="8" fill="#868e96">reserved</text>

  <!-- Pin 9: IO3 — MQ-6 ADC (USED, amber) -->
  <rect x="452" y="108" width="46" height="204" fill="#fd7e14" stroke="#d4640a" stroke-width="1" rx="2"/>
  <text x="475" y="130" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">9</text>
  <text x="475" y="148" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">IO3</text>
  <text x="475" y="165" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">MQ-6</text>
  <text x="475" y="178" text-anchor="middle" font-size="9" fill="#ffe5d0">ADC1_CH2</text>
  <text x="475" y="300" text-anchor="middle" font-size="8" fill="#ffe5d0">Propane</text>

  <!-- Pin 10: IO14 — unused -->
  <rect x="502" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="525" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">10</text>
  <text x="525" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO14</text>
  <text x="525" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- Pin 11: IO4 — unused -->
  <rect x="552" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="575" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">11</text>
  <text x="575" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO4</text>
  <text x="575" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- Pin 12: IO13 — unused -->
  <rect x="602" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="625" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">12</text>
  <text x="625" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO13</text>
  <text x="625" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- Pin 13: IO5 — I²C SDA (USED, teal) -->
  <rect x="652" y="108" width="46" height="204" fill="#20c997" stroke="#15826a" stroke-width="1" rx="2"/>
  <text x="675" y="130" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">13</text>
  <text x="675" y="148" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">IO5</text>
  <text x="675" y="165" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">I²C SDA</text>
  <text x="675" y="178" text-anchor="middle" font-size="8" fill="#cdf3e6">shared bus</text>
  <text x="675" y="300" text-anchor="middle" font-size="8" fill="#cdf3e6">CO2/VOC/CO</text>

  <!-- Pin 14: IO12 — unused -->
  <rect x="702" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="725" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">14</text>
  <text x="725" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO12</text>
  <text x="725" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- Pin 15: IO6 — I²C SCL (USED, teal) -->
  <rect x="752" y="108" width="46" height="204" fill="#20c997" stroke="#15826a" stroke-width="1" rx="2"/>
  <text x="775" y="130" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">15</text>
  <text x="775" y="148" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">IO6</text>
  <text x="775" y="165" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">I²C SCL</text>
  <text x="775" y="178" text-anchor="middle" font-size="8" fill="#cdf3e6">shared bus</text>
  <text x="775" y="300" text-anchor="middle" font-size="8" fill="#cdf3e6">CO2/VOC/CO</text>

  <!-- Pin 16: IO11 — unused -->
  <rect x="802" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="825" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">16</text>
  <text x="825" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO11</text>
  <text x="825" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- Pin 17: IO7 — unused -->
  <rect x="852" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="875" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">17</text>
  <text x="875" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO7</text>
  <text x="875" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- Pin 18: IO10 — unused -->
  <rect x="902" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="925" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">18</text>
  <text x="925" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO10</text>
  <text x="925" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- Pin 19: IO8 — unused -->
  <rect x="952" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="975" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">19</text>
  <text x="975" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO8</text>
  <text x="975" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- Pin 20: IO9 — unused -->
  <rect x="1002" y="108" width="46" height="204" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="2"/>
  <text x="1025" y="130" text-anchor="middle" font-size="12" fill="#868e96" font-weight="700">20</text>
  <text x="1025" y="148" text-anchor="middle" font-size="10" fill="#868e96" font-weight="600">IO9</text>
  <text x="1025" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">--</text>

  <!-- =============== ROUTING LINES TO SENSORS =============== -->
  <!-- Pin 9 (MQ-6 ADC) routing -->
  <line x1="475" y1="320" x2="475" y2="370" stroke="#fd7e14" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- Pin 13 (SDA) and Pin 15 (SCL) — converge to I²C bus -->
  <line x1="675" y1="320" x2="675" y2="370" stroke="#20c997" stroke-width="2" marker-end="url(#arr-down)"/>
  <line x1="775" y1="320" x2="775" y2="370" stroke="#20c997" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- =============== SENSOR BLOCKS =============== -->

  <!-- MQ-6 block -->
  <rect x="392" y="378" width="166" height="120" fill="#fff8f0" stroke="#fd7e14" stroke-width="1.5" rx="6"/>
  <text x="475" y="400" text-anchor="middle" font-size="13" fill="#d4640a" font-weight="700">MQ-6 Propane</text>
  <text x="475" y="416" text-anchor="middle" font-size="10" fill="#495057">DFRobot SEN0131</text>
  <text x="402" y="438" font-size="10" fill="#495057">VCC → Pin 2 (5V)</text>
  <text x="402" y="454" font-size="10" fill="#495057">GND → Pin 3 / 4</text>
  <text x="402" y="470" font-size="10" fill="#495057">SIG → 10k+15k → IO3</text>
  <text x="475" y="490" text-anchor="middle" font-size="9" fill="#868e96" font-style="italic">analog, ~150 mA heater</text>

  <!-- I²C bus shared block -->
  <rect x="600" y="378" width="240" height="120" fill="#f1faf6" stroke="#20c997" stroke-width="1.5" rx="6"/>
  <text x="720" y="400" text-anchor="middle" font-size="13" fill="#15826a" font-weight="700">I²C Bus (shared)</text>
  <text x="720" y="416" text-anchor="middle" font-size="10" fill="#495057">SDA = IO5, SCL = IO6, 100 kHz</text>
  <text x="610" y="438" font-size="10" fill="#495057">VCC → Pin 1 (3.3V)</text>
  <text x="610" y="454" font-size="10" fill="#495057">GND → Pin 3 / 4</text>
  <text x="610" y="470" font-size="10" fill="#495057">SDA → Pin 13 (IO5)</text>
  <text x="610" y="486" font-size="10" fill="#495057">SCL → Pin 15 (IO6)</text>

  <!-- Three sensors on the I²C bus -->
  <!-- SCD41 -->
  <rect x="60" y="540" width="280" height="170" fill="#eef5ff" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="200" y="562" text-anchor="middle" font-size="13" fill="#1d4ed8" font-weight="700">SCD41 — CO2 + Temp + Humidity</text>
  <text x="200" y="578" text-anchor="middle" font-size="10" fill="#495057">DFRobot SEN0536  |  I²C 0x62</text>
  <text x="70" y="600" font-size="10" fill="#495057">3V3 → red wire</text>
  <text x="70" y="616" font-size="10" fill="#495057">GND → black wire</text>
  <text x="70" y="632" font-size="10" fill="#495057">SDA → blue wire (yellow on Gravity)</text>
  <text x="70" y="648" font-size="10" fill="#495057">SCL → yellow wire (white on Gravity)</text>
  <text x="70" y="672" font-size="10" fill="#1d4ed8" font-weight="600">Outputs:</text>
  <text x="80" y="688" font-size="10" fill="#495057">• CO2 (NDIR, 400-5000 ppm)</text>
  <text x="80" y="702" font-size="10" fill="#495057">• Temp ±0.8°C, Humidity ±6% RH</text>

  <!-- SGP40 -->
  <rect x="360" y="540" width="280" height="170" fill="#f6efff" stroke="#8b5cf6" stroke-width="1.5" rx="6"/>
  <text x="500" y="562" text-anchor="middle" font-size="13" fill="#6d28d9" font-weight="700">SGP40 — VOC Index</text>
  <text x="500" y="578" text-anchor="middle" font-size="10" fill="#495057">DFRobot SEN0394  |  I²C 0x59</text>
  <text x="370" y="600" font-size="10" fill="#495057">3V3 → red wire</text>
  <text x="370" y="616" font-size="10" fill="#495057">GND → black wire</text>
  <text x="370" y="632" font-size="10" fill="#495057">SDA → shared with SCD41 / SEN0466</text>
  <text x="370" y="648" font-size="10" fill="#495057">SCL → shared with SCD41 / SEN0466</text>
  <text x="370" y="672" font-size="10" fill="#6d28d9" font-weight="600">Output:</text>
  <text x="380" y="688" font-size="10" fill="#495057">• VOC Index (1-500, baseline ≈ 100)</text>
  <text x="380" y="702" font-size="10" fill="#495057">• RH/T compensation from SCD41</text>

  <!-- SEN0466 CO -->
  <rect x="660" y="540" width="380" height="170" fill="#fff4ed" stroke="#ea580c" stroke-width="1.5" rx="6"/>
  <text x="850" y="562" text-anchor="middle" font-size="13" fill="#c2410c" font-weight="700">SEN0466 — Carbon Monoxide</text>
  <text x="850" y="578" text-anchor="middle" font-size="10" fill="#495057">DFRobot factory-calibrated electrochemical  |  I²C 0x74</text>
  <text x="670" y="600" font-size="10" fill="#495057">3V3 → red wire</text>
  <text x="670" y="616" font-size="10" fill="#495057">GND → black wire</text>
  <text x="670" y="632" font-size="10" fill="#495057">SDA → shared</text>
  <text x="670" y="648" font-size="10" fill="#495057">SCL → shared</text>
  <text x="670" y="672" font-size="10" fill="#c2410c" font-weight="600">Outputs:</text>
  <text x="680" y="688" font-size="10" fill="#495057">• CO concentration in ppm (0-1000)</text>
  <text x="680" y="702" font-size="10" fill="#495057">• Active mode set at boot via 9-byte I²C frame</text>
  <text x="870" y="672" font-size="10" fill="#c2410c" font-weight="600">DIP switch:</text>
  <text x="880" y="688" font-size="10" fill="#495057">• default address 0x74</text>
  <text x="880" y="702" font-size="10" fill="#495057">• change DIP if conflicts</text>

  <!-- =============== LEGEND =============== -->
  <rect x="40" y="725" width="1020" height="22" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="4"/>

  <rect x="56" y="730" width="14" height="12" fill="#e74c3c"/>
  <text x="74" y="740" font-size="10" fill="#495057">Power 3.3V</text>

  <rect x="148" y="730" width="14" height="12" fill="#52a441"/>
  <text x="166" y="740" font-size="10" fill="#495057">Power 5V (MQ-6)</text>

  <rect x="270" y="730" width="14" height="12" fill="#adb5bd"/>
  <text x="288" y="740" font-size="10" fill="#495057">Ground</text>

  <rect x="346" y="730" width="14" height="12" fill="#fd7e14"/>
  <text x="364" y="740" font-size="10" fill="#495057">Analog (MQ-6 ADC)</text>

  <rect x="478" y="730" width="14" height="12" fill="#20c997"/>
  <text x="496" y="740" font-size="10" fill="#495057">I²C bus (shared)</text>

  <rect x="604" y="730" width="14" height="12" fill="#dee2e6"/>
  <text x="622" y="740" font-size="10" fill="#495057">Reserved (USB)</text>

  <rect x="722" y="730" width="14" height="12" fill="#e9ecef"/>
  <text x="740" y="740" font-size="10" fill="#495057">Unused (free for expansion)</text>
</svg>
